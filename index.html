<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Reumann | Videographer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 
      Using Google Fonts:
      Rationale -> Body Text
      Karantina -> Headings
      Space Grotesk -> Special (Excluded text)
    -->
    <link href="https://fonts.googleapis.com/css2?family=Rationale&family=Karantina:wght@300;400;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Big+Shoulders+Stencil+Text:wght@100..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'dr-bg': 'transparent',
              'dr-red': '#888888', /* Grayscale accent for body */
              'dr-blue': '#03CAAE', /* Turquoise accent for navbar */
              'dr-text': '#EAE8E4',
              'dr-grey': '#B0B0B0',
            },
            fontFamily: {
              'heading': ['Karantina', 'sans-serif'],
              'body': ['Rationale', 'sans-serif'],
              'special': ['Space Grotesk', 'sans-serif'],
              'rounded': ['Rationale', 'sans-serif'],
              'stencil': ['"Big Shoulders Stencil Text"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      body {
        margin: 0;
        min-height: 100vh;
        background-color: #1a1a1a;
        /* Layered texture: 
           1. Dense halftone pattern (light dots)
           2. Subtle scanlines
           3. Base radial gradient
        */
        background: 
          radial-gradient(circle, rgba(255, 255, 255, 0.12) 0.8px, transparent 0.8px),
          repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px),
          radial-gradient(circle at 50% 0%, #191919 0%, #404040 100%);
        background-size: 4px 4px, 100% 8px, 100% 100%;
        background-attachment: scroll;
        background-repeat: repeat, repeat, no-repeat;
        position: relative;
      }

      @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
      }

      @keyframes tv-turn-on {
        0% { transform: scale(0.001, 0.001); background: #ffffff; opacity: 1; }
        30% { transform: scale(1, 0.005); background: #ffffff; opacity: 1; }
        50% { transform: scale(1, 1); background: transparent; opacity: 1; }
        100% { transform: scale(1, 1); background: transparent; opacity: 1; }
      }

      .tv-turn-on-overlay {
        animation: tv-turn-on 2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        background: black;
      }

      .tv-static {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        animation: static-noise 0.1s infinite;
      }

      @keyframes static-noise {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-1%, 1%); }
        50% { transform: translate(1%, -1%); }
        75% { transform: translate(-2%, -2%); }
      }

      .glitch-hover:hover {
        animation: glitch 0.2s infinite;
        text-shadow: 2px 0 #ff0000, -2px 0 #00ff00;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
      }

      @keyframes slideDown {
        from { transform: translateY(-10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slideDown {
        animation: slideDown 0.3s ease-out forwards;
      }

      .fragmented-headline {
        background: 
          linear-gradient(115deg, #808080 0% 12%, transparent 12.1%),
          linear-gradient(245deg, #959595 0% 22%, transparent 22.1%),
          linear-gradient(15deg, #A8A8A8 0% 32%, transparent 32.1%),
          linear-gradient(195deg, #BCBCBC 0% 42%, transparent 42.1%),
          linear-gradient(75deg, #D0D0D0 0% 52%, transparent 52.1%),
          linear-gradient(285deg, #E3E3E3 0% 62%, transparent 62.1%),
          linear-gradient(135deg, #F6F6F6 0% 72%, transparent 72.1%),
          #FFFFFF;
        background-size: 100% 100%;
        background-position: center;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent !important;
        display: inline-block;
      }

      .fragmented-headline-color {
        background: 
          linear-gradient(115deg, #028A76 0% 12%, transparent 12.1%),
          linear-gradient(245deg, #1FA692 0% 22%, transparent 22.1%),
          linear-gradient(15deg, #3CBDA9 0% 32%, transparent 32.1%),
          linear-gradient(195deg, #59D4C0 0% 42%, transparent 42.1%),
          linear-gradient(75deg, #76EBD7 0% 52%, transparent 52.1%),
          linear-gradient(285deg, #93F2EE 0% 62%, transparent 62.1%),
          linear-gradient(135deg, #B0F9F5 0% 72%, transparent 72.1%),
          #FFFFFF;
        background-size: 100% 100%;
        background-position: center;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent !important;
        display: inline-block;
      }
    </style>
